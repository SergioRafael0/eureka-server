# Nombre del servicio en el registro y en logs
spring.application.name=eureka-server

# Puerto del dashboard y de los endpoints REST de Eureka
server.port=8761

# Este proyecto es el propio servidor de Eureka, no un cliente:
# no debe registrarse a si mismo ni descargar el registro
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Limpia el registro en memoria al apagar (util en desarrollo)
eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000

# Endpoints expuestos del actuator (health, info y eureka para el dashboard)
management.endpoints.web.exposure.include=health,info,eureka
management.endpoint.health.show-details=always

# Excluye la auto-configuracion de Spring Security para que el dashboard
# de Eureka no requiera login en desarrollo. La inclusion de Spring Security
# debe ser autorizada de forma explicita segun las reglas del proyecto.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
